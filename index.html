<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zana — Haftasonu Anıları</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5efe6;
      --dark: #1a1612;
      --mid: #2c2520;
      --accent: rgba(255, 255, 255, 0.85);
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: #fff;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Gradient overlay — dark at top & bottom, light in middle */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(15, 10, 8, 0.72) 0%,
          rgba(15, 10, 8, 0.25) 35%,
          rgba(15, 10, 8, 0.18) 55%,
          rgba(15, 10, 8, 0.55) 100%
        );
      z-index: 1;
    }

    /* Unsplash placeholder — dramatic outdoor/nature dusk scene */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80');
      background-size: cover;
      background-position: center 60%;
      filter: brightness(0.78) saturate(0.9);
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #fff;
    }

    .nav-logo .logo-icon {
      width: 44px;
      height: 44px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo .logo-icon svg {
      width: 22px;
      height: 22px;
      fill: rgba(255,255,255,0.85);
    }

    .nav-logo span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.06em;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.6);
      color: rgba(255,255,255,0.88);
      background: transparent;
      padding: 10px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
      white-space: nowrap;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    /* ── HERO CONTENT ── */
    .hero-body {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      gap: 0;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: #fff;
      text-shadow: 0 2px 32px rgba(0,0,0,0.4);
      margin-bottom: 22px;
    }

    .hero-subtitle {
      font-size: clamp(0.6rem, 1.1vw, 0.75rem);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 46px;
    }

    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.18);
      padding: 14px 34px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, border-color 0.25s;
      backdrop-filter: blur(4px);
    }

    .btn-hero:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.8);
    }

    .btn-hero .arrow {
      font-size: 1rem;
      font-weight: 300;
    }

    /* ── DISCOVER ── */
    .discover {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 32px;
      gap: 10px;
    }

    .discover span {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .discover-line {
      width: 1px;
      height: 36px;
      background: rgba(255,255,255,0.4);
      animation: pulse-line 2s ease-in-out infinite;
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 0.9; transform: scaleY(1.15); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav {
        padding: 20px 24px;
      }

      .nav-links {
        display: none;
      }

      .btn-outline {
        display: none;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>

    <!-- NAV -->
    <nav>
      <a href="#" class="nav-logo">
        <div class="logo-icon">
          <!-- Simple tent/mountain icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2 L22 20 H2 Z M12 2 L2 20 M12 2 L22 20 M8 20 L12 11 L16 20"/>
          </svg>
        </div>
        <span>Zana</span>
      </a>

      <ul class="nav-links">
        <li><a href="#">Modeller</a></li>
        <li><a href="#">Hakkımızda</a></li>
        <li><a href="#">Galeri</a></li>
        <li><a href="#">SSS</a></li>
        <li><a href="#">İletişim</a></li>
      </ul>

      <a href="#" class="btn-outline">Keşfetmeye Başla</a>
    </nav>

    <!-- HERO CONTENT -->
    <div class="hero-body">
      <h1 class="hero-title">Haftasonu anıları yaratın</h1>
      <p class="hero-subtitle">Doğa için tasarlandı.&nbsp;&nbsp;Konfor için geliştirildi.</p>
      <a href="#" class="btn-hero">
        Keşfetmeye Başla <span class="arrow">&#8594;</span>
      </a>
    </div>

    <!-- DISCOVER -->
    <div class="discover">
      <span>Keşfet</span>
      <div class="discover-line"></div>
    </div>
  </section>

</body>
</html>
